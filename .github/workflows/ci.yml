name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint + Typecheck + Unit + E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: docbase
          POSTGRES_PASSWORD: docbase
          POSTGRES_DB: docbase_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://docbase:docbase@localhost:5432/docbase_test
      REDIS_URL: redis://localhost:6379
      BETTER_AUTH_SECRET: ci_test_secret_replace_in_production_minimum_32
      BETTER_AUTH_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Create test config
        run: |
          mkdir -p config
          echo '{"databaseUrl":"postgres://docbase:docbase@localhost:5432/docbase_test","redisUrl":"redis://localhost:6379","betterAuthSecret":"ci_test_secret_replace_in_production_minimum_32","betterAuthUrl":"http://localhost:3000","publicAppUrl":"http://localhost:3000"}' > config/docbase.config.json
          touch config/install.lock

      - name: Lint
        run: pnpm lint:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + Integration tests
        run: pnpm test:coverage

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Build
        run: pnpm build

      - name: E2E tests
        run: pnpm test:e2e
