name: Deploy (CD)

# =============================================================================
# DocBase 生产发布到阿里云 FC 3.0。
#
# 与本地手动发布完全一致：
#   cd <repo> && pnpm build:fc:local
#   cd fc-deploy && set -a && source prod.env && set +a && npx s deploy -y
# 这里用 `scripts/deploy-fc.sh apply` 把整条链封装到一步：
#   load_env → optional preflight/migrate/admin → build → s deploy → smoke。
#
# 触发：push to deploy / workflow_dispatch（手动）
# Runner：GitHub 托管 ubuntu-latest
# 凭证：GitHub Secrets 直接注入（ALIYUN_AK/SK 等）
# 证书：证书续签由 cert-renew.yml 单独每天检查处理
# =============================================================================

on:
  push:
    branches: [deploy]
  workflow_dispatch:
    inputs:
      skip_migrate:
        description: Skip DB migrations (FC re-deploy only)
        required: false
        default: 'false'
      skip_admin_ensure:
        description: Skip admin account ensure
        required: false
        default: 'false'

concurrency:
  group: deploy-docbase
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy → FC cn-shanghai
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30

    env:
      DOCBASE_REGION: cn-shanghai
      DOCBASE_DOMAIN: docbase.zerocmf.com

    steps:
      # ---------- (0) 拉代码 ----------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
          ref: deploy

      # ---------- (1) 安装工具 + 配置凭证 ----------
      - name: Install tools + configure s credentials
        env:
          ALIYUN_AK: ${{ secrets.ALIYUN_AK }}
          ALIYUN_SK: ${{ secrets.ALIYUN_SK }}
        run: |
          set -e
          npm install -g @serverless-devs/s pnpm
          s --version
          pnpm --version
          # 配置 s 凭证（s.yaml 用 access: default）
          s config delete -a default --silent 2>/dev/null || true
          s config add --AccessKeyID "$ALIYUN_AK" --AccessKeySecret "$ALIYUN_SK" --AccountID 165000000000000 --silent -a default

      # ---------- (2) Stage FC env 文件 ----------
      - name: Stage FC env file
        env:
          VPC_ID: ${{ secrets.VPC_ID }}
          VSWITCH_ID: ${{ secrets.VSWITCH_ID }}
          SECURITY_GROUP_ID: ${{ secrets.SECURITY_GROUP_ID }}
          APP_DB_URL: ${{ secrets.APP_DB_URL }}
          REDIS_APP_URL: ${{ secrets.REDIS_APP_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          ALIYUN_AK: ${{ secrets.ALIYUN_AK }}
          ALIYUN_SK: ${{ secrets.ALIYUN_SK }}
        run: |
          set -euo pipefail
          : "${RUNNER_TEMP:=/tmp}"
          OUT="$RUNNER_TEMP/docbase-fc.env"
          {
            echo "VPC_ID=${VPC_ID}"
            echo "VSWITCH_ID=${VSWITCH_ID}"
            echo "SECURITY_GROUP_ID=${SECURITY_GROUP_ID}"
            echo "DATABASE_URL=${APP_DB_URL}"
            echo "REDIS_URL=${REDIS_APP_URL}"
            echo "BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}"
            echo "BETTER_AUTH_URL=https://${DOCBASE_DOMAIN}"
            echo "PUBLIC_APP_URL=https://${DOCBASE_DOMAIN}"
            echo "BETTER_AUTH_TRUSTED_ORIGINS=https://${DOCBASE_DOMAIN},https://${DOCBASE_REGION}.fcapp.run"
            echo "DOCBASE_DEPLOY_MODE=fc"
            echo "DOCBASE_INSTALLED=true"
            echo "LOG_LEVEL=info"
          } >> "$OUT"
          chmod 600 "$OUT"

      # ---------- (3) 数据库迁移（workflow_dispatch 可选跳过） ----------
      - name: Drizzle migrations
        if: github.event.inputs.skip_migrate != 'true'
        run: bash scripts/run-migrate.sh
        env:
          APP_DB_URL: ${{ secrets.APP_DB_URL }}

      # ---------- (4) 构建 + 发布到 FC + smoke ----------
      - name: Build + deploy to FC + smoke
        env:
          DOCBASE_FC_ENV_FILE: ${{ runner.temp }}/docbase-fc.env
          DOCBASE_RUN_PREFLIGHT: '0'
          DOCBASE_RUN_MIGRATIONS: '0'
          DOCBASE_RUN_ADMIN_ENSURE: ${{ github.event.inputs.skip_admin_ensure != 'true' && '1' || '0' }}
        run: |
          set -euo pipefail
          cp "$DOCBASE_FC_ENV_FILE" /tmp/docbase-fc.env
          cp /tmp/docbase-fc.env fc-deploy/prod.env
          chmod 600 fc-deploy/prod.env
          bash scripts/deploy-fc.sh apply

      # ---------- (5) 通知 ----------
      - name: Notify success
        if: success()
        run: bash scripts/notify.sh success
        env:
          DOCBASE_DOMAIN: ${{ env.DOCBASE_DOMAIN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Notify failure
        if: failure()
        run: bash scripts/notify.sh failure || true
        env:
          DOCBASE_DOMAIN: ${{ env.DOCBASE_DOMAIN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
