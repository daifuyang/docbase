name: Deploy (CD)

# =============================================================================
# DocBase 生产发布到阿里云 FC 3.0。
#
# 与本地手动发布完全一致：
#   cd <repo> && pnpm build:fc:local
#   cd fc-deploy && set -a && source prod.env && set +a && npx s deploy -y
# 这里用 `scripts/deploy-fc.sh apply` 把整条链封装到一步：
#   load_env → build → s deploy → smoke。
#
# 触发：push to deploy / workflow_dispatch（手动）
# Runner：GitHub 托管 ubuntu-latest
# 凭证：GitHub Secrets 直接注入（ALIYUN_AK/SK 等）
# 证书：证书续签由 cert-renew.yml 单独每天检查处理
# =============================================================================

on:
  push:
    branches: [deploy]
  workflow_dispatch:

concurrency:
  group: deploy-docbase
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy → FC cn-shanghai
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30

    env:
      DOCBASE_REGION: cn-shanghai
      DOCBASE_DOMAIN: docbase.zerocmf.com

    steps:
      # ---------- (0) 拉代码 ----------
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1
          ref: deploy

      # ---------- (1) 安装工具 + 配置凭证 ----------
      - name: Install tools + configure s credentials
        env:
          ALIYUN_AK: ${{ secrets.ALIYUN_AK }}
          ALIYUN_SK: ${{ secrets.ALIYUN_SK }}
          ALIYUN_ACCOUNT_ID: ${{ secrets.ALIYUN_ACCOUNT_ID }}
        run: |
          set -e
          npm install -g @serverless-devs/s pnpm
          s --version
          pnpm --version
          mkdir -p ~/.s
          printf 'default:\n  AccessKeyID: "%s"\n  AccessKeySecret: "%s"\n  AccountID: "%s"\n' "$ALIYUN_AK" "$ALIYUN_SK" "$ALIYUN_ACCOUNT_ID" > ~/.s/access.yaml
          echo "=== access.yaml 内容 ==="
          cat ~/.s/access.yaml
          echo "=== s config get ==="
          s config get -a default
          echo "=== env vars (脱敏) ==="
          echo "ALIYUN_AK=${ALIYUN_AK:0:4}***"
          echo "ALIYUN_SK=${ALIYUN_SK:0:4}***"
          echo "ALIYUN_ACCOUNT_ID=${ALIYUN_ACCOUNT_ID:0:4}***"
          echo "=== 测试 aliyun CLI ==="
          npm install -g aliyun-cli
          ALIBABA_CLOUD_ACCESS_KEY_ID="$ALIYUN_AK" \
          ALIBABA_CLOUD_ACCESS_KEY_SECRET="$ALIYUN_SK" \
          ALIBABA_CLOUD_ACCOUNT_ID="$ALIYUN_ACCOUNT_ID" \
          aliyun fc ListFunctions --region cn-shanghai --output json 2>&1 | head -5

      # ---------- (2) Stage FC env 文件（从 secrets 写到 fc-deploy/prod.env，s.yaml 的 ${env(...)} 这里取）----------
      - name: Stage FC env file
        env:
          VPC_ID: ${{ secrets.VPC_ID }}
          VSWITCH_ID: ${{ secrets.VSWITCH_ID }}
          SECURITY_GROUP_ID: ${{ secrets.SECURITY_GROUP_ID }}
          APP_DB_URL: ${{ secrets.APP_DB_URL }}
          REDIS_APP_URL: ${{ secrets.REDIS_APP_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
        run: |
          set -euo pipefail
          OUT="fc-deploy/prod.env"
          {
            echo "VPC_ID=${VPC_ID}"
            echo "VSWITCH_ID=${VSWITCH_ID}"
            echo "SECURITY_GROUP_ID=${SECURITY_GROUP_ID}"
            echo "DATABASE_URL=${APP_DB_URL}"
            echo "REDIS_URL=${REDIS_APP_URL}"
            echo "BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}"
            echo "BETTER_AUTH_URL=https://${DOCBASE_DOMAIN}"
            echo "PUBLIC_APP_URL=https://${DOCBASE_DOMAIN}"
            echo "BETTER_AUTH_TRUSTED_ORIGINS=https://${DOCBASE_DOMAIN},https://${DOCBASE_REGION}.fcapp.run"
            echo "DOCBASE_DEPLOY_MODE=fc"
            echo "DOCBASE_INSTALLED=true"
            echo "LOG_LEVEL=info"
          } > "$OUT"
          chmod 600 "$OUT"
          echo "=== prod.env (redacted for log) ==="
          sed -E \
            -e 's#^(VPC_ID|VSWITCH_ID|SECURITY_GROUP_ID|PUBLIC_APP_URL|BETTER_AUTH_URL|BETTER_AUTH_TRUSTED_ORIGINS|LOG_LEVEL|DOCBASE_DEPLOY_MODE|DOCBASE_INSTALLED|NODE_ENV|PORT|PATH)=.*#\1=***#' \
            -e 's#^(DATABASE_URL|REDIS_URL|MIGRATE_DATABASE_URL|BETTER_AUTH_SECRET|ALIYUN_AK|ALIYUN_SK)(.*://)([^:]+):([^@]+)@(.*)#\1\2\3:****@\5#' \
            "$OUT"

      # ---------- (3) 构建 + 发布到 FC + smoke ----------
      # NOTE on DB migrations: GitHub Actions runners sit on the public
      # internet and cannot reach the production Postgres at its private
      # VPC IP. We intentionally do NOT run `drizzle-kit migrate` here.
      # Schema upgrades live in `.github/workflows/migrate.yml`, which
      # invokes a dedicated `docbase-migrate` FC function via aliyun CLI
      # `InvokeFunction`. That function runs inside the production VPC
      # with the PG superuser URL. Trigger it manually from the Actions
      # tab before or after a deploy as needed; the two workflows are
      # intentionally decoupled so a missing migration function doesn't
      # block code deploys.
      - name: Build + deploy to FC + smoke
        run: |
          set -euo pipefail
          echo "=== fc-deploy/prod.env what s sees (redacted) ==="
          sed -E \
            -e 's#^(VPC_ID|VSWITCH_ID|SECURITY_GROUP_ID|PUBLIC_APP_URL|BETTER_AUTH_URL|BETTER_AUTH_TRUSTED_ORIGINS|LOG_LEVEL|DOCBASE_DEPLOY_MODE|DOCBASE_INSTALLED|NODE_ENV|PORT|PATH)=.*#\1=***#' \
            -e 's#^(DATABASE_URL|REDIS_URL|MIGRATE_DATABASE_URL|BETTER_AUTH_SECRET)(.*://)([^:]+):([^@]+)@(.*)#\1\2\3:****@\5#' \
            fc-deploy/prod.env
          bash scripts/deploy-fc.sh apply