name: Release CLI

# Triggered by `git tag v* && git push --tags`. Builds the `docbase` CLI
# into a single self-contained binary per OS/arch, uploads them to a
# GitHub Release, and lets `curl | install` scripts grab the latest.
#
# Install (Linux/macOS):
#   curl -L https://github.com/$REPO/releases/latest/download/docbase-$TARGET \
#     -o /usr/local/bin/docbase && chmod +x /usr/local/bin/docbase
# where TARGET ∈ {linux-x64, linux-arm64, darwin-x64, darwin-arm64, windows-x64.exe}.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only, do not create a release (for testing)'
        type: boolean
        default: false

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x64
          - linux-arm64
          - darwin-x64
          - darwin-arm64
          - windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The `bun` target produces a portable binary that runs on any OS/arch
      # the matrix entry names — Bun handles cross-compile via embedded
      # static binaries for native deps (esbuild, sharp, etc).
      - name: Build CLI binary
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p dist
          # CLI is HTTP-only: no service / better-auth / tanstack imports,
          # so a single `bun build --compile` produces a self-contained
          # binary per OS/arch. bun appends `.exe` on Windows targets.
          bun build --compile \
            --target=bun-${{ matrix.target }} \
            --outfile=dist/docbase-${{ matrix.target }} \
            src/cli/index.ts
          # Resolve the actual filename (Windows gets `.exe`)
          BIN="dist/docbase-${{ matrix.target }}"
          [ -f "${BIN}.exe" ] && BIN="${BIN}.exe"
          chmod +x "${BIN}"

      - name: Smoke test (linux-x64 only)
        if: matrix.target == 'linux-x64'
        # `--help` exits with code 1 in our CLI because program.exitOverride()
        # fires on outputHelp(); the output itself is correct, so || true.
        run: ./dist/docbase-linux-x64 --help || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docbase-${{ matrix.target }}
          path: dist/docbase-${{ matrix.target }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd dist
          # Resolve actual filenames (Windows target has .exe suffix)
          files=$(ls docbase-* | grep -v SHA256SUMS)
          sha256sum $files > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
          files: |
            dist/docbase-linux-x64
            dist/docbase-linux-arm64
            dist/docbase-darwin-x64
            dist/docbase-darwin-arm64
            dist/docbase-windows-x64.exe
            dist/SHA256SUMS.txt
