name: Cert Renew (Daily)

# =============================================================================
# 证书续签：每天检查一次，DocBase FC 自定义域名证书快过期（≤30 天）才续签。
#
# 参考 cert-auto 的逻辑：
#   1. 检查 Aliyun CAS 中当前域名证书的剩余有效期
#   2. 证书 > 30 天到期 → 无操作，退出
#   3. 证书 ≤ 30 天到期 → ACME DNS-01 自动签发 + 上传到 Aliyun CAS
#   4. 调用根目录 s.yaml 的 fc3-domain 资源，更新 FC 自定义域名绑定
#
# 触发：每天北京时间 00:00（UTC 16:00）
# Runner：GitHub 托管 ubuntu-latest
# 凭证：AIC_CONFIG secret（aic toml 配置）
# =============================================================================

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: Renew if cert expires within N days
        required: false
        default: '30'

concurrency:
  group: cert-renew
  cancel-in-progress: true

jobs:
  cert-renew:
    name: cert renew check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DOCBASE_DOMAIN: docbase.zerocmf.com
      DOCBASE_DOMAIN_CERT_NAME: docbase-zerocmf-com
      DOCBASE_DNS_PROFILE: personal
      DOCBASE_ALIYUN_CERT_PROFILE: enterprise

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install tools + configure s credentials
        env:
          ALIYUN_AK: ${{ secrets.ALIYUN_AK }}
          ALIYUN_SK: ${{ secrets.ALIYUN_SK }}
          ALIYUN_ACCOUNT_ID: ${{ secrets.ALIYUN_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npm install -g @serverless-devs/s @zerocmf/aic
          s --version
          aic --version
          mkdir -p ~/.s
          printf 'default:\n  AccessKeyID: "%s"\n  AccessKeySecret: "%s"\n  AccountID: "%s"\n' "$ALIYUN_AK" "$ALIYUN_SK" "$ALIYUN_ACCOUNT_ID" > ~/.s/access.yaml

      - name: Setup aic config
        env:
          AIC_CONFIG: ${{ secrets.AIC_CONFIG }}
        run: |
          mkdir -p ~/.config/aic
          printf '%s\n' "$AIC_CONFIG" > ~/.config/aic/config.toml

      - name: Install acme.sh
        run: |
          curl https://get.acme.sh | sh -s email=admin@zerocmf.com

      - name: Stage domain env file
        run: |
          set -euo pipefail
          OUT="fc-deploy/prod.env"
          {
            echo "DOCBASE_DOMAIN=${DOCBASE_DOMAIN}"
            echo "DOCBASE_DOMAIN_CERT_NAME=${DOCBASE_DOMAIN_CERT_NAME}"
            echo "DOCBASE_DNS_PROFILE=${DOCBASE_DNS_PROFILE}"
            echo "DOCBASE_ALIYUN_CERT_PROFILE=${DOCBASE_ALIYUN_CERT_PROFILE}"
          } > "$OUT"

      - name: Renew FC custom domain certificate if needed
        run: |
          set -euo pipefail
          export DOCBASE_FC_ENV_FILE="fc-deploy/prod.env"
          export RENEW_DAYS="${{ github.event.inputs.days || '30' }}"
          bash scripts/renew-fc-domain-cert.sh
