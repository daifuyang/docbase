name: Cert Renew (Daily)

# =============================================================================
# 证书续签：每天检查一次，证书快过期（≤30 天）才续签。
#
# 参考 cert-auto 的逻辑：
#   aic cert:renew --days 30
#   - 证书 > 30 天到期 → 无操作，退出
#   - 证书 ≤ 30 天到期 → 自动续签 + 上传到 Aliyun CAS
#
# 触发：每天 00:00 UTC（北京时间 08:00）
# Runner：GitHub 托管 ubuntu-latest
# 凭证：AIC_CONFIG secret（aic toml 配置）
# =============================================================================

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: Renew if cert expires within N days
        required: false
        default: '30'

concurrency:
  group: cert-renew
  cancel-in-progress: true

jobs:
  cert-renew:
    name: cert renew check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Setup aic config
        env:
          AIC_CONFIG: ${{ secrets.AIC_CONFIG }}
        run: |
          mkdir -p ~/.config/aic
          printf '%s\n' "$AIC_CONFIG" > ~/.config/aic/config.toml

      - name: Install aic CLI
        run: |
          npm install -g @zerocmf/aic
          aic --version

      - name: Check certificate expiry
        run: |
          set -euo pipefail
          RENEW_DAYS="${{ github.event.inputs.days || '30' }}"
          echo "▶ Checking certs expiring within $RENEW_DAYS days..."

          # aic cert:renew 会自动判断是否需要续签，不会无限制重试
          aic cert:renew --days "$RENEW_DAYS" || {
            exit_code=$?
            # aic cert:renew 0=成功续签, 0=无需续签, 非0=真正错误
            # 避免 exit 1 被当作 workflow 失败处理
            if [ $exit_code -eq 0 ]; then
              echo "Certificate check completed."
            else
              echo "Certificate check failed with code: $exit_code"
              exit $exit_code
            fi
          }
