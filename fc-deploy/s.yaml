# =============================================================================
# DocBase — fc-deploy 自包含 FC 3.0 配置
# =============================================================================
# 与根目录的 s.yaml 平行存在。根目录的 s.yaml 给 CI runner + 自定义域名
# (fc3-domain) 用，fc-deploy/s.yaml 给"本地能完整跑起来"的部署单元用。
#
# 线上 / 本地切换完全通过环境变量：
#   - ${env(VPC_ID)} 等线上用真凭证，本地用 placeholder（fc3 local 不连 FC API）
#   - 本地：cp .env.example .env && s local start --env-file .env
#   - 线上：s deploy --env-file <prod.env>
#
# fc-deploy/ 的内容由 scripts/build-fc.mjs 重新生成；s.yaml / .env.example /
# .gitignore / README.md 手维护提交 git，dist/ node_modules/ db/ 由 .gitignore 排除。
# =============================================================================
edition: 3.0.0
name: docbase-fc-deploy
access: default

vars:
  region: cn-shanghai
  functionName: docbase-web
  serviceName: docbase-prod

resources:
  docbase-web:
    component: fc3
    props:
      region: ${vars.region}
      serviceName: ${vars.serviceName}
      functionName: ${vars.functionName}
      description: DocBase enterprise knowledge base (TanStack Start on FC, fc-deploy/)
      runtime: custom.debian12
      code: .                            # fc-deploy/ 自身即 code 根
      handler: not-used                  # custom runtime 时 FC 不使用 handler
      timeout: 60
      memorySize: 1024
      cpu: 1
      diskSize: 512
      instanceConcurrency: 100
      internetAccess: true
      customRuntimeConfig:
        # 线上：FC 把 fc-deploy/ 整体 mount 到 /code，bootstrap 在 /code/ 根
        command:
          - /code/bootstrap
        port: 9000
      logConfig:
        project: docbase-fc-log
        logstore: fc-log
        enableRequestMetrics: false
        enableInstanceMetrics: false
      vpcConfig:
        vpcId: ${env(VPC_ID)}
        vSwitchIds:
          - ${env(VSWITCH_ID)}
        securityGroupId: ${env(SECURITY_GROUP_ID)}
      triggers:
        - triggerName: http-trigger
          triggerType: http
          qualifier: LATEST
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
              - HEAD
      environmentVariables:
        NODE_ENV: production
        PORT: '9000'
        # custom.debian12 自带 node22, 但 PATH 必须显式声明 (FC 不保证默认 PATH 包含它)
        PATH: /var/fc/lang/nodejs22/bin:/usr/local/bin:/usr/local/sbin:/usr/bin:/usr/sbin:/sbin:/bin
        DATABASE_URL: ${env(DATABASE_URL)}
        REDIS_URL: ${env(REDIS_URL)}
        BETTER_AUTH_SECRET: ${env(BETTER_AUTH_SECRET)}
        BETTER_AUTH_URL:    ${env(BETTER_AUTH_URL)}
        PUBLIC_APP_URL:     ${env(PUBLIC_APP_URL)}
        LOG_LEVEL:          info